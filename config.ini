# Configuration for Agentic Document Processor
# Load environment variables from .env file for sensitive data (API keys)

[paths]
# Project directories (relative to project root)
data_dir = data
samples_dir = data/samples
reports_dir = reports
logs_dir = logs
cache_dir = data/cache

[stack]
# Free-tier stack profile (Groq LLM + FAISS vectors + local cache + S3 storage)
# Cost-optimized: No OpenSearch/ElastiCache charges
profile = local
execution_mode = sync
llm_provider = groq
ocr_provider = tesseract
vector_provider = faiss
storage_provider = local_fs
cache_provider = sqlite
observability_provider = langsmith

[aws]
# Cloud resource settings (minimal free-tier setup)
# All sensitive values loaded from .env file
region = ${AWS_REGION}
s3_bucket = ${AWS_S3_BUCKET}
groq_secret_name = ${AWS_GROQ_SECRET_NAME}
langsmith_secret_name = ${AWS_LANGSMITH_SECRET_NAME}
redis_endpoint = ${AWS_REDIS_ENDPOINT}
textract_enabled = false

[llm_cache]
# Persistent local cache to reduce repeated LLM calls
enabled = true
ttl_seconds = 86400
max_entries = 5000

[groq]
# Groq API Configuration (PRIMARY)
# Get keys from https://console.groq.com/
# Check https://console.groq.com/docs/models for current model list
api_key = ${GROQ_API_KEY}
api_key_b = ${GROQ_API_KEY_B}
api_key_c = ${GROQ_API_KEY_C}
model = llama-3.1-8b-instant
max_tokens = 800
temperature = 0.0
timeout = 8

[bedrock]
# AWS Bedrock Configuration (FALLBACK - Most Reliable)
region = us-east-1
access_key_id = ${AWS_ACCESS_KEY_ID}
secret_access_key = ${AWS_SECRET_ACCESS_KEY}
model_id = ${BEDROCK_MODEL_ID}

max_tokens = 400
temperature = 0.0
timeout = 30

[huggingface]
# HuggingFace API Configuration (Faster fallback)
api_key = ${HF_API_KEY}
model = meta-llama/Llama-3.1-8B-Instruct
max_tokens = 512
temperature = 0.0
timeout = 30

[runtime]
# Local default keeps all fallbacks enabled.
# Set true in cloud if you want to hard-disable HuggingFace.
skip_hf = false
# Enable startup warmup so FAISS/HF embeddings are loaded at API start,
# reducing first-request latency during validator execution.
startup_warmup_enabled = true

[ollama]
# Ollama Local Server (run: ollama serve)
base_url = http://localhost:11434
model = llama3.1
timeout = 60

[local_llama]
# Local Llama via GGUF (llama-cpp-python) - Fastest fallback
# Uses quantized Q4_K_M model for efficient GPU/CPU inference
model_name = local-gguf
context_length = 512
temperature = 0.0
max_tokens = 64
batch_size = 256
use_gpu = true
# GGUF model path (quantized Q4_K_M)
model_path = ./models/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf
n_gpu_layers = 35

[retry]
# Retry configuration for all LLM calls
max_retries = 3
min_wait = 2
max_wait = 10
multiplier = 2

[ocr]
# Tesseract OCR configuration
tesseract_cmd = C:\Users\charanl\AppData\Local\Programs\Tesseract-OCR\tesseract.exe
languages = eng

[document]
# Document processing configuration
max_chunk_size = 3000
chunk_overlap = 200

[pii]
# PII detection fields
fields = email,phone,ssn,credit_card,address,name,date_of_birth

[metrics]
# Production thresholds
min_extraction_accuracy = 0.90
min_pii_recall = 0.95
min_pii_precision = 0.90
min_workflow_success_rate = 0.90
max_p95_latency_ms = 4000.0

[api]
# API server configuration
host = 0.0.0.0
port = 8000
reload = false

[langgraph]
# LangGraph visualization
visualizer_enabled = true

[flowise]
# Flowise integration (optional)
enabled = false
api_url = 
api_key = ${FLOWISE_API_KEY}

[logging]
# Logging configuration
level = INFO
format = json

[langsmith]
# LangSmith observability (optional)
# Enable and set API key when you want cloud tracing.
enabled = true
api_key = ${LANGSMITH_API_KEY}
project = agentic-doc-processor
endpoint = https://api.smith.langchain.com
request_traces = true
